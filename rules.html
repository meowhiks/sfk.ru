<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Правила сервера "Сервер для котиков"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-white p-8">
    <h1 class="text-4xl font-bold mb-8 text-center glow">Правила сервера "Сервер для котиков"</h1>
    <div class="max-w-3xl mx-auto" id="rules-container"></div>

    <script>
        const rules = [
            { 
                title: "1.1 Принятие правил", 
                text: "Присоединяясь к серверу, вы соглашаетесь с данными правилами и обязуетесь их соблюдать.",
                punishment: "Предупреждение"
            },
            { 
                title: "1.2 Равенство участников", 
                text: "Все пользователи равны перед правилами, независимо от статуса или роли.",
                punishment: "—"
            },
            { 
                title: "1.3 Запрет на оскорбления", 
                text: "Запрещены любые формы оскорблений, унижений и травли других участников.",
                punishment: "Мут на 1 час, при повторном нарушении - бан на 1 день"
            },
            { 
                title: "1.4 Спам и флуд", 
                text: "Запрещено отправлять большое количество однотипных сообщений или засорять чат бессмысленной информацией.",
                punishment: "Мут на 30 минут, при повторном нарушении - мут на 2 часа"
            },
            { 
                title: "1.5 Реклама", 
                text: "Запрещена любая несогласованная реклама, включая ссылки на другие серверы Discord.",
                punishment: "Удаление сообщения и предупреждение, при повторном нарушении - бан на 3 дня"
            },
        ];

        const rulesContainer = document.getElementById('rules-container');

        rules.forEach((rule, index) => {
            const ruleElement = document.createElement('div');
            ruleElement.className = 'bg-gray-800 p-4 rounded-lg mb-4 relative overflow-hidden group';
            ruleElement.innerHTML = `
                <h2 class="text-xl font-semibold mb-2">${rule.title}</h2>
                <p class="mb-2">${rule.text}</p>
                <div class="text-sm text-red-400">
                    <strong>Наказание:</strong> ${rule.punishment}
                </div>
                <div class="absolute top-2 right-2 w-8 h-8 bg-yellow-500 rounded-full opacity-30"></div>
            `;
            rulesContainer.appendChild(ruleElement);

            gsap.from(ruleElement, {
                opacity: 0,
                y: 20,
                duration: 0.3,
                delay: index * 0.1
            });

            ruleElement.addEventListener('mouseenter', () => {
                gsap.to(ruleElement, {
                    scale: 1.02,
                    duration: 0.3
                });
                gsap.to(ruleElement.querySelector('.bg-yellow-500'), {
                    scale: 1.2,
                    rotation: 360,
                    duration: 3,
                    repeat: -1
                });
            });

            ruleElement.addEventListener('mouseleave', () => {
                gsap.to(ruleElement, {
                    scale: 1,
                    duration: 0.3
                });
                gsap.to(ruleElement.querySelector('.bg-yellow-500'), {
                    scale: 1,
                    rotation: 0,
                    duration: 0.3
                });
            });
        });
    </script>
</body>
</html>
