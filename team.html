<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Команда сервера</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-white p-8">
    <h1 class="text-4xl font-bold mb-8 text-center glow">Команда сервера</h1>
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-4" id="team-container"></div>

    <script>
        const teamMembers = [
            { name: "Котик Креатер☕", role: "Администратор", avatar: "admin.png", color: "from-red-500 to-yellow-500" },
            { name: "Котик Димусус", role: "Старший модератор", avatar: "stmod.png", color: "from-blue-500 to-green-500" },
            { name: "Котик Топовик", role: "Модератор", avatar: "mod1.png", color: "from-indigo-500 to-purple-500" },
            { name: "Котик Квас", role: "Модератор", avatar: "mod2.png", color: "from-pink-500 to-red-500" },
        ];

        const teamContainer = document.getElementById('team-container');

        teamMembers.forEach((member, index) => {
            const memberElement = document.createElement('div');
            memberElement.className = `bg-gray-800 p-4 rounded-lg flex items-center relative overflow-hidden`;
            memberElement.innerHTML = `
                <div class="absolute inset-0 bg-gradient-to-r ${member.color} opacity-20"></div>
                <img src="${member.avatar}" alt="${member.name}" class="w-16 h-16 rounded-full mr-4 z-10">
                <div class="z-10">
                    <h2 class="text-xl font-semibold">${member.name}</h2>
                    <p class="text-gray-400">${member.role}</p>
                </div>
                <div class="absolute -top-2 -right-2 w-16 h-16 bg-white rounded-full opacity-10"></div>
            `;
            teamContainer.appendChild(memberElement);

            gsap.from(memberElement, {
                opacity: 0,
                scale: 0.9,
                duration: 0.3,
                delay: index * 0.1
            });

            memberElement.addEventListener('mouseenter', () => {
                gsap.to(memberElement, {
                    scale: 1.05,
                    duration: 0.3
                });
                gsap.to(memberElement.querySelector('.rounded-full:last-child'), {
                    scale: 1.2,
                    rotation: 360,
                    duration: 3,
                    repeat: -1
                });
            });

            memberElement.addEventListener('mouseleave', () => {
                gsap.to(memberElement, {
                    scale: 1,
                    duration: 0.3
                });
                gsap.to(memberElement.querySelector('.rounded-full:last-child'), {
                    scale: 1,
                    rotation: 0,
                    duration: 0.3
                });
            });
        });
    </script>
</body>
</html>
